appName: kafka

namespace: dev

# Storage
s3Storage:
  create: false

efsStorage:
  create: false

fileShareStorage:
  create: false

# Workload
deployment: false

statefulset: true

replicaCount: 3

# Labels
deploymentLabels: {}

statefulsetLabels:
  app: kafka

deploymentSpec: {}

selectorLabels:
  app: kafka

# Image
image:
  registry: public.ecr.aws
  repository: xxxxxx/kafka
  pullPolicy: IfNotPresent
  tag: 3.9.2

imagePullSecrets: []

# Pod Config
podAnnotations:
  app.kubernetes.io/name: kafka

podLabels:
  app: kafka

# Environment
env:
  - name: DOMAIN
    value: dev.com
  - name: POD_NAME
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: metadata.name
  - name: KAFKA_NODE_ID
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
  - name: KAFKA_PROCESS_ROLES
    value: broker,controller
  - name: KAFKA_LISTENERS
    value: SASL_PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
  - name: KAFKA_ADVERTISED_LISTENERS
    value: SASL_PLAINTEXT://$(POD_NAME).kafka-headless-svc.dev.svc.cluster.local:9092,EXTERNAL://dev-$(POD_NAME).$(DOMAIN):9094
  - name: KAFKA_CONTROLLER_LISTENER_NAMES
    value: CONTROLLER
  - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
    value: SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT
  - name: KAFKA_INTER_BROKER_LISTENER_NAME
    value: SASL_PLAINTEXT
  - name: KAFKA_CONTROLLER_QUORUM_VOTERS
    value: 0@kafka-0.kafka-headless-svc.dev.svc.cluster.local:9093,1@kafka-1.kafka-headless-svc.dev.svc.cluster.local:9093,2@kafka-2.kafka-headless-svc.dev.svc.cluster.local:9093
  - name: KAFKA_CONTROLLER_QUORUM_ELECTION_TIMEOUT_MS
    value: "5000"
  - name: KAFKA_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS
    value: "4000"
  - name: KAFKA_CONTROLLER_QUORUM_REQUEST_TIMEOUT_MS
    value: "10000"
  - name: KAFKA_CONTROLLER_QUORUM_RETRY_BACKOFF_MS
    value: "2000"
  - name: KAFKA_CONTROLLER_SOCKET_TIMEOUT_MS
    value: "30000"
  - name: KAFKA_SASL_ENABLED_MECHANISMS
    value: PLAIN
  - name: KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL
    value: PLAIN
  - name: KAFKA_OPTS
    value: -Djava.security.auth.login.config=/etc/kafka/config/jaas/kafka_server_jaas.conf
  - name: KAFKA_NUM_PARTITIONS
    value: "1"
  - name: KAFKA_DEFAULT_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_MIN_INSYNC_REPLICAS
    value: "1"
  - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
    value: "1"
  - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
    value: "0"
  - name: KAFKA_LOG_DIRS
    value: /data
  - name: KAFKA_LOG4J_OPTS
    value: >-
      -Dlog4j.configuration=file:/etc/kafka/config/log/log4j.properties
      -Dkafka.logs.dir=/dev/logs/middleware/$(POD_NAME)
  - name: KAFKA_LOG_RETENTION_HOURS
    value: "168"

envFrom: {}

# Service Account
serviceAccount:
  create: false

# Security
podSecurityContext: {}

containerSecurityContext:
  runAsUser: 1001      
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

# Service
service:
  type: ClusterIP
  ports:
    - name: kafka-plain
      port: 9092
      targetPort: 9092
    - name: kafka-cont
      port: 9093
      targetPort: 9093
    - name: kafka-external
      port: 9094
      targetPort: 9094

headlessService:
  create: true

# Ingress
ingress:
  enabled: false
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: dashboard-tools.com
      paths:
        - path: /kafka
          pathType: Prefix
          serviceName: kafka-svc
          backendPort: 8080
  tls:
   - secretName: kafka-secret
     hosts:
       - dashboard.com

# Resources
resources:
  requests:
    cpu: "1"
    memory: "1Gi"
  limits:
    cpu: "2"
    memory: "2Gi"

# Probes
livenessProbe: {}

readinessProbe: {}

startupProbe: {}

podFailureConfigurations: {}

# Autoscaling
autoscaling:
  enabled: false

# Volumes
volumes:
  - name: ccmaas
    persistentVolumeClaim:
      claimName: dev-pvc
  - name: log4j
    configMap:
      defaultMode: 420
      name: kafka-log4j-configmap
  - name: jaas-config
    configMap:
      defaultMode: 420
      name: kafka-log4j-configmap
  - name: logs
    emptyDir: {}
  - name: kafka
    emptyDir: {}
  - name: tmp
    emptyDir: {}

volumeMounts:
  - name: data
    mountPath: /data
  - name: ccmaas
    mountPath: /ccmaas
  - name: log4j
    mountPath: /etc/kafka/config/log/log4j.properties
    subPath: log4j.properties
  - name: jaas-config
    mountPath: /etc/kafka/config/jaas/kafka_server_jaas.conf
    subPath: kafka_server_jaas.conf
  - name: logs
    mountPath: /var/log/kafka
  - name: kafka
    mountPath: /opt/kafka
  - name: tmp
    mountPath: /tmp
    
# Scheduling
nodeSelector: {}

tolerations: []

affinity: {}

# Containers
initContainers:
  - name: kafka-init-container
    image: public.ecr.aws/xxxxx/kafka:3.9.2
    imagePullPolicy: IfNotPresent
    command:
      - sh
      - -c
      - |
        cp -R /opt/kafka/* /mnt/kafka/ || true
        chown -R 1001:1001 /mnt/kafka/
        /mnt/kafka/bin/kafka-storage.sh format \
          --ignore-formatted \
          --cluster-id 5L6g3nShT-eMCtK--X86sw \
          --config /mnt/kafka/config/kraft/server.properties || true
    resources: {}
    securityContext:
      runAsUser: 0
    terminationMessagePath: /dev/termination-log
    terminationMessagePolicy: File
    volumeMounts:
      - name: kafka
        mountPath: /mnt/kafka
      - name: data
        mountPath: /data

container: {}

# ConfigMap
configMaps: []
secrets: []
persistentVolume:
  create: false

volumeClaimTemplates:
  name: data
  storageClassName: dev-sc
  accessModes: ReadWriteOnce
  storage: 10Gi

clusterRoleBinding:
  create: false

persistentVolumeClaim:
  create: false
